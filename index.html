<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase FID Tracker</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f4f4f9; }
        .card { background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        #fid-display { font-weight: bold; color: #0366d6; word-break: break-all; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>مستخرج معرف Firebase (FID)</h2>
        <p>يتم الآن استخراج المعرف الخاص بمتصفحك...</p>
        <div id="fid-display">جاري التحميل...</div>
        <p style="font-size: 0.8rem; color: #666;">افتح Console المتصفح (F12) لمزيد من التفاصيل.</p>
    </div>

    <!-- استدعاء ملف الجافا سكريبت كـ Module -->
    <script type="module" src="./app.js"></script>
</body>
</html>
