<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M2 Edison Preview - Coming Soon</title>
    <style>
        /* تصميم الواجهة الاحترافي */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000000; /* خلفية سوداء */
            color: #ffffff; /* نص أبيض */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden; /* لمنع التمرير */
        }

        .container {
            text-align: center;
        }

        /* شعار القرد */
        .monkey-logo {
            font-size: 100px;
            margin-bottom: 20px;
            display: block;
        }

        /* نص الانتظار */
        .coming-soon-text {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        /* إخفاء عنصر الـ FID تماماً عن العين */
        #fid-display {
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="monkey-logo">🐒</div>
        <div class="coming-soon-text">Coming Soon</div>
    </div>

    <!-- هذا العنصر موجود لكي يعمل الكود البرمجي لكنه مخفي تماماً -->
    <div id="fid-display"></div>

    <!-- استدعاء المنطق البرمجي في الخلفية -->
    <script type="module" src="./app.js"></script>
</body>
</html>
