<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M2 Edison Preview - Coming Soon</title>
    <style>
        /* تنسيقات الصفحة الأساسية - خلفية سوداء ونصف أبيض */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000000; /* خلفية سوداء تماماً */
            color: #ffffff; /* نص أبيض */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .container {
            padding: 2rem;
        }

        /* تنسيق شعار القرد (باستخدام الإيموجي كشعار سريع) */
        .monkey-logo {
            font-size: 80px; /* حجم الشعار */
            margin-bottom: 20px;
        }

        /* تنسيق النص الإنجليزي */
        .coming-soon-text {
            font-size: 3rem;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        /* تنسيق منطقة الـ FID (جعلناها صغيرة وغير ملفتة للحفاظ على التصميم) */
        #fid-section {
            font-size: 0.8rem;
            color: #444; /* لون رمادي غامق جداً ليكون شبه مخفي */
            margin-top: 50px;
            border-top: 1px solid #222;
            padding-top: 10px;
        }
        #fid-display {
            font-family: monospace;
            word-break: break-all;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- شعار القرد (إيموجي) -->
        <div class="monkey-logo">🐒</div>
        
        <!-- النص الإنجليزي (انتظرونا) -->
        <div class="coming-soon-text">Coming Soon</div>
    </div>

    <!-- منطقة الـ FID (ستظل تعمل في الخلفية وستظهر هنا بشكل خافت) -->
    <div id="fid-section">
        FID: <span id="fid-display">Loading...</span>
    </div>

    <!-- استدعاء ملف الجافا سكريبت (لا تغير هذا السطر) -->
    <script type="module" src="./app.js"></script>
</body>
</html>
